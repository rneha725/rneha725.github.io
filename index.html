<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neha.</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />

  <!-- Your config files — edit these, not this file -->
  <script src="config.js"></script>
  <script src="notes.js"></script>
  <script src="quotes.js"></script>

  <style>
/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:#2a2d40; border-radius:4px; }

/* ── Tokens ─────────────────────────────────────────────── */
:root {
  --bg:        #0c0e17;
  --bg2:       #12141f;
  --bg3:       #1a1d2e;
  --border:    rgba(255,255,255,0.06);
  --border-h:  rgba(255,255,255,0.13);
  --text:      rgba(255,255,255,0.75);
  --text-dim:  rgba(255,255,255,0.32);
  --text-head: #ffffff;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-serif:'Lora', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Loading state ──────────────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  z-index: 9999;
  font-size: 13px; color: var(--text-dim);
  letter-spacing: 1px;
  transition: opacity 0.4s;
}
#loading.done { opacity: 0; pointer-events: none; }

/* ── Hero ───────────────────────────────────────────────── */
.hero {
  padding: 72px 64px 48px;
  max-width: 1160px;
  margin: 0 auto;
}
.hero-name {
  font-family: var(--font-serif);
  font-size: 54px; font-weight: 400; font-style: italic;
  color: var(--text-head); letter-spacing: -0.5px; line-height: 1;
}
.hero-sub {
  font-size: 13px; color: var(--text-dim);
  letter-spacing: 1.8px; text-transform: uppercase; margin-top: 8px;
}
.quote-strip {
  margin-top: 28px;
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.quote-pipe {
  width: 2px; height: 18px; border-radius: 2px;
  flex-shrink: 0; transition: background 1s;
}
.quote-text-wrap {
  flex: 1; position: relative; height: 22px; overflow: hidden;
}
.quote-slot {
  position: absolute; inset: 0;
  display: flex; align-items: center;
  font-size: 13.5px; color: var(--text-dim);
  font-style: italic; font-family: var(--font-serif);
  opacity: 0; transition: opacity 1s ease;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; text-decoration: none;
}
.quote-slot:hover .quote-main { color: var(--text); }
.quote-slot.visible { opacity: 1; }
.quote-from {
  font-size: 11px; color: var(--text-dim);
  font-family: var(--font-sans); font-style: normal;
  margin-left: 12px; letter-spacing: 0.6px;
  white-space: nowrap; opacity: 0.55;
  transition: opacity 0.2s;
}
.quote-slot:hover .quote-from { opacity: 0.9; }

/* ── Filter bar ─────────────────────────────────────────── */
.filter-bar {
  max-width: 1160px; margin: 0 auto;
  padding: 0 64px 36px;
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
}
.filter-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-dim); margin-right: 4px;
}
.filter-tag {
  padding: 4px 11px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 11.5px; cursor: pointer;
  font-family: var(--font-sans); transition: all 0.15s;
}
.filter-tag:hover  { border-color: var(--border-h); color: var(--text); }
.filter-tag.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: var(--text-head); }

/* ── Main content ───────────────────────────────────────── */
.content { max-width: 1160px; margin: 0 auto; padding: 0 64px 96px; }

/* ── Obsession card ─────────────────────────────────────── */
.obsession-wrap { margin-bottom: 52px; }
.obsession-label-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%; position: relative;
}
.pulse-dot::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 1px solid currentColor;
  animation: pulse-ring 2.2s ease-out infinite;
}
@keyframes pulse-ring {
  0%   { opacity:.7; transform:scale(.9); }
  70%  { opacity:0;  transform:scale(1.8); }
  100% { opacity:0;  transform:scale(1.8); }
}
.obsession-label-text {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 1.6px; font-weight: 500;
}
.obsession-card {
  background: var(--bg2); border-radius: 16px;
  padding: 28px 32px; cursor: pointer;
  transition: box-shadow 0.2s, border-color 0.2s;
  position: relative; overflow: hidden;
  border: 1px solid;
}
.obsession-card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, currentColor, transparent);
  opacity: 0.4;
}
.obsession-card:hover { box-shadow: 0 0 40px rgba(0,0,0,0.3); }
.obsession-card-title {
  font-size: 20px; font-weight: 600;
  color: var(--text-head); font-family: var(--font-serif); margin-bottom: 8px;
}
.obsession-card-excerpt {
  font-size: 13.5px; color: var(--text-dim); line-height: 1.7; max-width: 640px;
}
.obsession-card-meta {
  margin-top: 16px; display: flex; align-items: center; gap: 10px;
}
.badge {
  font-size: 10px; padding: 3px 10px; border-radius: 20px;
  letter-spacing: 0.6px; border: 1px solid;
}

/* ── Category section ───────────────────────────────────── */
.cat-section { margin-bottom: 48px; }
.cat-header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.cat-name { font-size: 13px; font-weight: 600; color: var(--text-head); }
.cat-dot  {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 9px; position: relative; top: -1px;
}
.cat-tagline {
  font-size: 12.5px; color: var(--text-dim);
  font-style: italic; font-family: var(--font-serif);
}
.cat-count { margin-left: auto; font-size: 11px; color: var(--text-dim); }

/* ── Cards ──────────────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px 22px 18px;
  cursor: pointer; display: flex; flex-direction: column;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--border-h);
  box-shadow: 0 8px 28px rgba(0,0,0,0.2);
}
.card.hidden { display: none; }
.card-title {
  font-size: 14px; font-weight: 600; color: var(--text-head);
  margin-bottom: 7px; line-height: 1.4;
  border-left: 2px solid; padding-left: 10px; margin-left: -10px;
}
.card-excerpt {
  font-size: 12.5px; color: var(--text-dim); line-height: 1.6; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer {
  display: flex; align-items: center;
  justify-content: space-between; margin-top: 14px;
  flex-wrap: wrap; gap: 6px;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
  background: rgba(255,255,255,0.05); color: var(--text-dim);
  letter-spacing: 0.3px;
}
.card-date { font-size: 11px; color: var(--text-dim); }
.cat-empty {
  font-size: 12.5px; color: var(--text-dim);
  font-style: italic; padding: 12px 2px;
}

/* ── Reading modal ──────────────────────────────────────── */
#overlay {
  display: none; position: fixed; inset: 0; z-index: 900;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
  align-items: flex-start; justify-content: center;
  overflow-y: auto; padding: 48px 24px;
}
#overlay.open { display: flex; }
#modal {
  background: var(--bg2); border: 1px solid var(--border-h);
  border-radius: 18px; width: min(700px, 100%);
  padding: 48px 52px; position: relative; margin: auto;
}
#modal-close {
  position: sticky; float: right; top: 0;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-dim);
  font-size: 13px; padding: 5px 12px; cursor: pointer;
  font-family: var(--font-sans); margin-bottom: 24px; margin-left: 16px;
  transition: color 0.15s, border-color 0.15s;
}
#modal-close:hover { color: var(--text-head); border-color: var(--border-h); }
#modal-badge {
  display: inline-block; font-size: 10px; padding: 3px 10px;
  border-radius: 20px; letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 20px; clear: both; border: 1px solid;
}
#modal-body { clear: both; }

/* ── Prose ──────────────────────────────────────────────── */
.prose { font-size: 15px; line-height: 1.85; color: var(--text); }
.prose h1 { font-family:var(--font-serif); font-size:28px; font-weight:400; color:var(--text-head); margin-bottom:12px; line-height:1.3; }
.prose h2 { font-size:17px; font-weight:600; color:var(--text-head); margin:32px 0 10px; }
.prose h3 { font-size:15px; font-weight:600; color:var(--text-head); margin:22px 0 8px; }
.prose p  { margin-bottom:16px; }
.prose ul, .prose ol { padding-left:22px; margin-bottom:16px; }
.prose li { margin-bottom:6px; }
.prose code { font-family:var(--font-mono); font-size:12px; background:var(--bg3); padding:2px 6px; border-radius:4px; color:#a99eff; }
.prose pre  { background:var(--bg3); border-radius:10px; padding:18px 20px; margin:18px 0; overflow-x:auto; }
.prose pre code { background:none; padding:0; color:var(--text); }
.prose blockquote { border-left:2px solid rgba(255,255,255,0.15); padding:4px 0 4px 18px; margin:18px 0; color:var(--text-dim); font-style:italic; font-family:var(--font-serif); }
.prose a { color:#a99eff; text-decoration:none; border-bottom:1px solid rgba(169,158,255,0.3); }
.prose a:hover { border-color:#a99eff; }
.prose strong { font-weight:600; color:var(--text-head); }
.prose hr { border:none; border-top:1px solid var(--border); margin:28px 0; }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 720px) {
  .hero, .filter-bar, .content { padding-left:24px; padding-right:24px; }
  .hero-name { font-size:36px; }
  #modal { padding:32px 24px; }
  .cards-grid { grid-template-columns:1fr; }
}
  </style>
</head>
<body>

<div id="loading">Loading notes…</div>

<!-- Hero -->
<header class="hero">
  <div>
    <div class="hero-name" id="hero-name"></div>
    <div class="hero-sub"  id="hero-sub"></div>
  </div>
  <div class="quote-strip">
    <div class="quote-pipe" id="quote-pipe"></div>
    <div class="quote-text-wrap">
      <a class="quote-slot" id="q0" href="#" onclick="return false"></a>
      <a class="quote-slot" id="q1" href="#" onclick="return false"></a>
    </div>
  </div>
</header>

<!-- Filter bar -->
<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="filter-tag active" data-tag="all">All</button>
</div>

<!-- Main content -->
<main class="content">
  <div id="obsession-wrap" style="display:none">
    <div class="obsession-label-row">
      <div class="pulse-dot" id="obs-dot"></div>
      <span class="obsession-label-text" id="obs-label-text">Current Obsession</span>
    </div>
    <div class="obsession-card" id="obsession-card">
      <div class="obsession-card-title"   id="obs-title"></div>
      <div class="obsession-card-excerpt" id="obs-excerpt"></div>
      <div class="obsession-card-meta">
        <span class="badge" id="obs-badge"></span>
        <span style="font-size:11px;color:var(--text-dim)" id="obs-date"></span>
      </div>
    </div>
  </div>
  <div id="cats"></div>
</main>

<!-- Reading modal -->
<div id="overlay" onclick="maybeClose(event)">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">✕ Close</button>
    <div id="modal-badge"></div>
    <div id="modal-body" class="prose"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   FRONTMATTER PARSER
   Reads the --- block at the top of each .md file
══════════════════════════════════════════════════════════ */
function parseFrontmatter(raw) {
  if (!raw.startsWith('---')) return { meta: {}, content: raw };
  const end = raw.indexOf('---', 3);
  if (end === -1) return { meta: {}, content: raw };

  const fm      = raw.slice(3, end).trim();
  const content = raw.slice(end + 3).trim();
  const meta    = {};

  fm.split('\n').forEach(line => {
    const colon = line.indexOf(':');
    if (colon === -1) return;
    const key = line.slice(0, colon).trim();
    let   val = line.slice(colon + 1).trim();

    // Arrays:  [a, b, c]
    if (val.startsWith('[') && val.endsWith(']')) {
      val = val.slice(1, -1).split(',').map(s => s.trim().replace(/^['"]|['"]$/g, '')).filter(Boolean);
    } else {
      val = val.replace(/^['"]|['"]$/g, '');
      if (val === 'true')  val = true;
      if (val === 'false') val = false;
    }
    meta[key] = val;
  });

  return { meta, content };
}

/* ══════════════════════════════════════════════════════════
   LOAD NOTES  — fetches every file in FILES (notes.js)
══════════════════════════════════════════════════════════ */
async function loadNotes() {
  const results = await Promise.all(
    FILES.map(async file => {
      try {
        const res = await fetch(file);
        if (!res.ok) return null;
        const raw = await res.text();
        const { meta, content } = parseFrontmatter(raw);
        return {
          file,
          title:     meta.title    || file.split('/').pop().replace('.md',''),
          date:      meta.date     || '',
          category:  meta.category || 'personal',
          sub:       meta.sub      || '',
          tags:      Array.isArray(meta.tags) ? meta.tags : [],
          excerpt:   meta.excerpt  || '',
          highlight: meta.highlight|| '',
          obsession: meta.obsession === true,
          md:        content,
        };
      } catch { return null; }
    })
  );
  return results.filter(Boolean);
}

/* ══════════════════════════════════════════════════════════
   QUOTE ROTATOR
══════════════════════════════════════════════════════════ */
const colorKeys = ['#F07A5A','#38C9C9','#9D82F5','#F0C040'];
let allQuotes = [], qIdx = 0, qActive = 0;
const slots  = [document.getElementById('q0'), document.getElementById('q1')];
const qPipe  = document.getElementById('quote-pipe');

function buildQuotes(notes) {
  // Quotes from note highlights
  const fromNotes = notes
    .filter(n => n.highlight)
    .map(n => ({ text: n.highlight, from: n.title, note: n }));

  // Extra hand-curated quotes from quotes.js
  const fromFile = (typeof EXTRA_QUOTES !== 'undefined' ? EXTRA_QUOTES : [])
    .map(q => ({ text: q.text, from: q.from, link: q.link, note: null }));

  // Shuffle together
  allQuotes = [...fromNotes, ...fromFile].sort(() => Math.random() - 0.5);
}

function showQuote(idx) {
  if (!allQuotes.length) return;
  const q    = allQuotes[idx % allQuotes.length];
  const next = 1 - qActive;

  slots[next].innerHTML =
    `<span class="quote-main">${q.text}</span>` +
    `<span class="quote-from">— ${q.from}</span>`;

  // clicking a note-linked quote opens that note's modal
  slots[next].onclick = q.note
    ? (e => { e.preventDefault(); openModal(q.note); })
    : q.link
      ? (e => { e.preventDefault(); window.open(q.link, '_blank'); })
      : (e => e.preventDefault());

  slots[next].classList.add('visible');
  slots[qActive].classList.remove('visible');
  qPipe.style.background = colorKeys[idx % colorKeys.length];
  qActive = next;
}

/* ══════════════════════════════════════════════════════════
   RENDER SITE
══════════════════════════════════════════════════════════ */
function render(notes) {
  // ── Hero text from config.js ──────────────────────────
  document.title = SITE.name;
  document.getElementById('hero-name').textContent = SITE.name;
  document.getElementById('hero-sub').textContent  = SITE.subtitle;

  // ── Obsession card ────────────────────────────────────
  const obs = notes.find(n => n.obsession);
  if (obs) {
    const cat = CATEGORIES[obs.category] || { label: obs.category, color: '#fff' };
    document.getElementById('obsession-wrap').style.display = '';
    document.getElementById('obs-title').textContent   = obs.title;
    document.getElementById('obs-excerpt').textContent  = obs.excerpt;
    document.getElementById('obs-date').textContent     = obs.date;

    const dot   = document.getElementById('obs-dot');
    const ltext = document.getElementById('obs-label-text');
    dot.style.background   = cat.color;
    dot.style.color        = cat.color;
    ltext.style.color      = cat.color;

    const badge            = document.getElementById('obs-badge');
    badge.textContent      = cat.label + (obs.sub ? ' · ' + obs.sub : '');
    badge.style.color      = cat.color;
    badge.style.borderColor= cat.color + '44';
    badge.style.background = cat.color + '18';

    const card             = document.getElementById('obsession-card');
    card.style.borderColor = cat.color + '30';
    card.style.color       = cat.color; // used by ::before gradient
    card.onclick           = () => openModal(obs);
  }

  // ── Categories ────────────────────────────────────────
  const catsEl   = document.getElementById('cats');
  const catOrder = Object.keys(CATEGORIES);

  catOrder.forEach(key => {
    const cat   = CATEGORIES[key];
    const these = notes.filter(n => n.category === key && !n.obsession);

    const section = document.createElement('div');
    section.className  = 'cat-section';
    section.dataset.cat = key;
    section.innerHTML = `
      <div class="cat-header">
        <div class="cat-name">
          <span class="cat-dot" style="background:${cat.color}"></span>${cat.label}
        </div>
        <div class="cat-tagline">${cat.tagline}</div>
        <div class="cat-count">${these.length} note${these.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="cards-grid" id="grid-${key}"></div>
      ${these.length === 0
        ? `<div class="cat-empty">Nothing here yet — drop a .md file into notes/${key}/ and add it to notes.js.</div>`
        : ''}`;
    catsEl.appendChild(section);

    const grid = section.querySelector(`#grid-${key}`);
    these.forEach(note => {
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.tags = note.tags.join(',');
      card.innerHTML  = `
        <div class="card-title" style="border-color:${cat.color}">${note.title}</div>
        <div class="card-excerpt">${note.excerpt}</div>
        <div class="card-footer">
          <div class="card-tags">${note.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <span class="card-date">${note.date}</span>
        </div>`;
      card.onclick = () => openModal(note);
      grid.appendChild(card);
    });
  });

  // ── Filter tags ───────────────────────────────────────
  const allTags  = [...new Set(notes.flatMap(n => n.tags))].sort();
  const filterBar = document.querySelector('.filter-bar');
  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className    = 'filter-tag';
    btn.dataset.tag  = tag;
    btn.textContent  = tag;
    filterBar.appendChild(btn);
  });

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-tag');
    if (!btn) return;
    activeTag = btn.dataset.tag;
    document.querySelectorAll('.filter-tag').forEach(b =>
      b.classList.toggle('active', b.dataset.tag === activeTag));
    filterCards();
  });

  // ── Quotes ────────────────────────────────────────────
  buildQuotes(notes);
  showQuote(0);
  setInterval(() => { qIdx++; showQuote(qIdx); }, 5000);
}

/* ══════════════════════════════════════════════════════════
   FILTER
══════════════════════════════════════════════════════════ */
let activeTag = 'all';
function filterCards() {
  document.querySelectorAll('.card').forEach(card => {
    const tags = card.dataset.tags ? card.dataset.tags.split(',') : [];
    card.classList.toggle('hidden', activeTag !== 'all' && !tags.includes(activeTag));
  });
  document.querySelectorAll('.cat-section').forEach(section => {
    const visible = [...section.querySelectorAll('.card:not(.hidden)')].length;
    let empty = section.querySelector('.cat-empty-filter');
    if (visible === 0 && activeTag !== 'all') {
      if (!empty) {
        empty = document.createElement('div');
        empty.className = 'cat-empty cat-empty-filter';
        section.querySelector('.cards-grid').after(empty);
      }
      empty.textContent  = `No notes tagged "${activeTag}" here.`;
      empty.style.display = '';
    } else if (empty) {
      empty.style.display = 'none';
    }
  });
}

/* ══════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════ */
function openModal(note) {
  const cat   = CATEGORIES[note.category] || { label: note.category, color: '#888' };
  const badge = document.getElementById('modal-badge');
  badge.textContent       = `${cat.label}${note.sub ? ' · ' + note.sub : ''}`;
  badge.style.color       = cat.color;
  badge.style.borderColor = cat.color + '44';
  badge.style.background  = cat.color + '18';

  document.getElementById('modal-body').innerHTML = marked.parse(note.md);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function maybeClose(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

(async () => {
  const notes = await loadNotes();
  render(notes);

  const loader = document.getElementById('loading');
  loader.classList.add('done');
  setTimeout(() => loader.remove(), 500);
})();
</script>
